name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
      - name: List all JS files
        run: ls -lS dist/client/assets/*.js
      - name: Create index.html
        run: |
          CSS=$(ls dist/client/assets/*.css | head -1 | xargs basename)
          MAINJS=$(ls -S dist/client/assets/index-*.js | head -1 | xargs basename)
          echo "CSS: $CSS"
          echo "JS: $MAINJS"
          cat > dist/client/index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="utf-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1" />
            <title>KAZUTCHI — Dancer & Choreographer</title>
            <base href="/artist-folio-prime/" />
            <link rel="stylesheet" href="./assets/$CSS" />
          </head>
          <body>
            <div id="root"></div>
            <script type="module" src="./assets/$MAINJS"></script>
          </body>
          </html>
          HTMLEOF
          cat dist/client/index.html
          cp dist/client/index.html dist/client/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/client
      - uses: actions/deploy-pages@v4
